name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['**']

# Cancel in-flight runs for the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: Lint, Format, Typecheck & Build
    runs-on: ubuntu-latest
    env:
      # Placeholder — nothing connects during generate/codegen/lint/typecheck/build
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder?schema=public
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @visualdsa/db run db:generate

      - name: Generate API client (codegen)
        run: pnpm codegen

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
