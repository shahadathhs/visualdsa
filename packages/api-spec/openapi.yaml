openapi: 3.0.0
paths:
  /api:
    get:
      operationId: AppController_getHello
      parameters: []
      responses:
        '200':
          description: Welcome message
      summary: Root endpoint
      tags:
        - App
  /api/health:
    get:
      operationId: AppController_health
      parameters: []
      responses:
        '200':
          description: Health status
      summary: Health check
      tags:
        - App
  /api/auth/register:
    post:
      operationId: AuthController_register
      parameters: []
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                properties:
                  accessToken:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
      summary: Register a new user
      tags:
        - Auth
  /api/auth/login:
    post:
      operationId: AuthController_login
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                properties:
                  accessToken:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
      summary: Login with email and password
      tags:
        - Auth
info:
  title: VisualDSA API
  description: VisualDSA API Documentation
  version: 0.0.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas: {}
